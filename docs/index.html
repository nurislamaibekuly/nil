<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
  <pre id="lyrics"></pre>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const title = urlParams.get('title') || "";
    const artist = urlParams.get('artist') || "";

    fetch('ttml.json')
      .then(res => {
        console.log(res);
        return res.json();
      })
      .then(entries => {
        console.log(entries);

        const entry = entries.find(e => 
          e.songname.toLowerCase() === title.toLowerCase() &&
          e.artist.toLowerCase() === artist.toLowerCase()
        );

        if (!entry) {
          document.getElementById('lyrics').textContent = "no lyrics found";
          return;
        }

        fetch(entry.path)
          .then(r => r.text())
          .then(ttml => {
            document.getElementById('lyrics').textContent = ttml;
          })
          .catch(err => {
            console.error(err);
          });
      })
      .catch(err => {
        console.error(err);
      });
  </script>
</body>
</html>
